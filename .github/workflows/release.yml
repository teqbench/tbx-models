# Thin caller — delegates to the org-wide reusable Release workflow.
# See: https://github.com/teqbench/.github/.github/workflows/release.yml

name: TeqBench Package - Release Workflow

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    uses: teqbench/.github/.github/workflows/release.yml@a73770227814529cea939ea6393b785db7ac3ffb # main
    secrets: inherit
